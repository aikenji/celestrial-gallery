<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Gallery | Astrophotography Portfolio</title>
    <!-- Elegant Serif Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050506; 
            --text-main: #e0e0e0;
            --text-dim: #888;
            --accent: #c5a059; 
            --spacing: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
            position: relative;
        }

        /* Starry Background */
        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            overflow: hidden;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* Elegant Header Section */
        header {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: var(--spacing);
            position: relative;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: 0.2rem;
            margin-bottom: 1rem;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.2s forwards;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        .subtitle {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            color: var(--accent);
            opacity: 0;
            animation: fadeInUp 1.2s 0.3s forwards;
        }

        /* Navigation Menu */
        nav {
            margin-top: 40px;
            display: flex;
            gap: 30px;
            opacity: 0;
            animation: fadeInUp 1.2s 0.6s forwards;
        }

        .nav-item {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            color: var(--text-dim);
            cursor: pointer;
            transition: color 0.3s ease;
            position: relative;
            padding-bottom: 5px;
            background: none;
            border: none;
            font-family: 'Inter', sans-serif;
        }

        .nav-item:hover, .nav-item.active {
            color: var(--accent);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            transform: translateX(-50%);
        }

        .nav-item:hover::after, .nav-item.active::after {
            width: 100%;
        }

        /* Photo Grid Layout */
        .gallery {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 var(--spacing) 100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 40px;
            position: relative;
        }

        .photo-card {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .photo-card:hover {
            transform: scale(1.02);
            border: 1px solid rgba(197, 160, 89, 0.3);
        }

        .photo-card img {
            width: 100%;
            height: 600px;
            object-fit: cover; /* Wallpaper-style fill */
            display: block;
            margin: 0 auto;
            filter: grayscale(5%) brightness(90%);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1), filter 0.6s ease;
            background: #000;
        }

        .photo-card:hover img {
            transform: scale(1.05);
            filter: grayscale(0%) brightness(100%);
        }

        .photo-info {
            padding: 20px;
            text-align: left;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.8));
        }

        .photo-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem;
            margin-bottom: 5px;
        }

        .photo-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1rem;
        }

        /* Lightbox Effect */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: zoom-out;
        }

        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.8rem;
            color: var(--text-dim);
            letter-spacing: 0.1rem;
            position: relative;
        }

        @media (max-width: 768px) {
            h1 { font-size: 2.5rem; }
            nav { gap: 15px; flex-wrap: wrap; justify-content: center; }
            .gallery { grid-template-columns: 1fr; }
            .photo-card img { height: 400px; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars-container"></div>

    <header>
        <div class="subtitle">Aiken Astrophotography</div>
        <h1>CELESTIAL GALLERY</h1>
        <nav>
            <button class="nav-item active" onclick="filterPhotos('ALL')">Home</button>
            <button class="nav-item" onclick="filterPhotos('PLANET')">Planet</button>
            <button class="nav-item" onclick="filterPhotos('NEBULA')">Nebula</button>
            <button class="nav-item" onclick="filterPhotos('GALAXY')">Galaxy</button>
            <button class="nav-item" onclick="filterPhotos('COMETS')">Comets</button>
        </nav>
    </header>

    <main class="gallery" id="gallery">
        <!-- Photos will be rendered by JavaScript -->
    </main>

    <div id="lightbox" onclick="this.style.display='none'">
        <img src="" id="lightbox-img">
    </div>

    <footer>
        <p>&copy; 2026 Astrophotography Collection &middot; Keep Looking Up</p>
    </footer>

    <script>
        // Star Background Generator
        function createStars() {
            const container = document.getElementById('stars-container');
            const starCount = 150;
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2 + 1 + 'px';
                const x = Math.random() * 100 + '%';
                const y = Math.random() * 100 + '%';
                const duration = Math.random() * 3 + 2 + 's';
                const delay = Math.random() * 5 + 's';
                star.style.width = size;
                star.style.height = size;
                star.style.left = x;
                star.style.top = y;
                star.style.setProperty('--duration', duration);
                star.style.animationDelay = delay;
                container.appendChild(star);
            }
        }
        createStars();

        const categoryOrder = ['PLANET', 'NEBULA', 'GALAXY', 'COMETS'];

        // Photo configuration grouped by category
        const photos = [
            {
                title: "Lunar Surface Detail",
                meta: "Moon | C925 | QHY716MC",
                url: "2026/luna.png",
                category: "PLANET",
                sort: 10
            },
            {
                title: "Jupiter - 2022.11.06",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2022-11-06.png",
                category: "PLANET",
                sort: 1
            },
            {
                title: "Jupiter - 2023.10.24",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2023-10-24.png",
                category: "PLANET",
                sort: 2
            },
            {
                title: "Mars - 2025.01.12",
                meta: "Mars | C925 | QHY716MC",
                url: "2026/mars-2025-01-12.png",
                category: "PLANET",
                sort: 3
            },
            {
                title: "Solar System Overview",
                meta: "Composited view | 16:9",
                url: "2026/solar system in 2025 16_9.jpg",
                category: "PLANET",
                sort: 4
            },
            {
                title: "Jupiter - 2025.12.17",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2025-12-17.png",
                category: "PLANET",
                sort: 5
            },
            {
                title: "Jupiter - 2025.11.21",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2025-11-21.png",
                category: "PLANET",
                sort: 6
            },
            {
                title: "Jupiter - 2025.11.04",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2025-11-04.png",
                category: "PLANET",
                sort: 7
            },
            {
                title: "Jupiter - 2026.01.14",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2026-01-14.png",
                category: "PLANET",
                sort: 8
            },
            {
                title: "Jupiter - 2026.03.13",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2026-03-13.png",
                category: "PLANET",
                sort: 9
            },
            {
                title: "Jupiter - 2026.04.04",
                meta: "Jupiter | C925 | QHY716MC",
                url: "2026/jup-2026-04-04.png",
                category: "PLANET",
                sort: 11
            },
            {
                title: "M78 Reflection Nebula",
                meta: "M78 | Deep Sky",
                url: "2026/M78.jpg",
                category: "NEBULA",
                sort: 1
            },
            {
                title: "C/2024 E3 Tsuchinshan",
                meta: "Comet | Deep Sky",
                url: "2026/C2024-E3-Tsuchinshan-2024-10-23-ed2.jpg",
                category: "COMETS",
                sort: 1
            }
        ];

        const gallery = document.getElementById('gallery');
        const lightbox = document.getElementById('lightbox');
        const lightboxImg = document.getElementById('lightbox-img');

        function shufflePhotos(items) {
            const copy = items.slice();
            for (let i = copy.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function getHomePhotos(limit = 6) {
            const buckets = categoryOrder
                .map(category => shufflePhotos(photos.filter(photo => photo.category === category)))
                .filter(bucket => bucket.length > 0);
            const selected = [];

            while (selected.length < limit && buckets.some(bucket => bucket.length > 0)) {
                for (const bucket of buckets) {
                    if (bucket.length === 0 || selected.length >= limit) {
                        continue;
                    }
                    selected.push(bucket.shift());
                }
            }

            return selected;
        }

        function renderPhotos(filter = 'ALL') {
            gallery.innerHTML = '';
            const filtered = filter === 'ALL' ? getHomePhotos(6) : photos.filter(p => p.category === filter);

            if (filtered.length === 0) {
                gallery.innerHTML = `<p style="text-align: center; color: var(--text-dim); padding: 50px 20px;">No images in this category yet.</p>`;
                return;
            }

            filtered.forEach(photo => {
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <img src="${photo.url}" alt="${photo.title}" loading="lazy" decoding="async">
                    <div class="photo-info">
                        <div class="photo-title">${photo.title}</div>
                        <div class="photo-meta">${photo.meta}</div>
                    </div>
                `;
                card.onclick = () => {
                    lightboxImg.src = photo.url;
                    lightbox.style.display = 'flex';
                };
                gallery.appendChild(card);
            });
        }

        function filterPhotos(category) {
            // Update active state in UI
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText.toUpperCase() === category.toUpperCase() || (category === 'ALL' && btn.innerText.toUpperCase() === 'HOME')) {
                    btn.classList.add('active');
                }
            });
            renderPhotos(category);
        }

        // Initial render
        renderPhotos();
    </script>
</body>
</html>
