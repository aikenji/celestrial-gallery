<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celestial Gallery | Aiken Astrophotography</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/gallery.css">
    <script src="data/gallery-data.js" defer></script>
    <script src="data/messier-catalog.js" defer></script>
    <script src="scripts/gallery.js" defer></script>
</head>
<body>
    <div class="stars-container" id="stars-container"></div>

    <header>
        <div class="subtitle">Aiken Astrophotography</div>
        <h1 class="gallery-title" id="gallery-title">
            <span class="title-layer title-layer-current">CELESTIAL GALLERY</span>
            <span class="title-layer title-layer-next" aria-hidden="true"></span>
        </h1>
        <nav id="nav-group"></nav>
    </header>

    <section class="messier-chart-panel" id="messier-chart-panel" hidden>
        <div class="messier-chart-shell">
            <div class="messier-chart-header">
                <div class="messier-chart-copy">
                    <div class="messier-chart-kicker">Messier Sky Chart</div>
                    <div class="messier-chart-title">All 110 Messier Targets</div>
                </div>
                <div class="messier-chart-stats">
                    <span class="messier-stat-value" id="messier-captured-count">0</span>
                    <span class="messier-stat-divider">/</span>
                    <span class="messier-stat-total" id="messier-total-count">110</span>
                    <span class="messier-stat-label">captured</span>
                </div>
            </div>
            <div class="messier-chart-legend" aria-hidden="true">
                <div class="messier-legend-group">
                    <span class="messier-legend-item">
                        <span class="messier-legend-shape is-nebula"></span>
                        Nebula
                    </span>
                    <span class="messier-legend-item">
                        <span class="messier-legend-shape is-cluster"></span>
                        Cluster
                    </span>
                    <span class="messier-legend-item">
                        <span class="messier-legend-shape is-galaxy"></span>
                        Galaxy
                    </span>
                </div>
            </div>
            <div class="messier-chart-frame">
                <svg id="messier-chart" class="messier-chart" viewBox="0 0 1200 720" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Messier sky chart"></svg>
                <div class="messier-hover-card" id="messier-hover-card" hidden>
                    <img class="messier-hover-image" id="messier-hover-image" alt="">
                    <div class="messier-hover-copy">
                        <div class="messier-hover-id" id="messier-hover-id"></div>
                        <div class="messier-hover-meta" id="messier-hover-meta"></div>
                    </div>
                </div>
            </div>
            <div class="messier-chart-footer">
                <div class="messier-chart-toggles">
                    <button class="messier-toggle-btn" id="toggle-ecliptic" type="button">
                        <span class="toggle-icon"></span>
                        Ecliptic
                    </button>
                    <button class="messier-toggle-btn" id="toggle-constellations" type="button">
                        <span class="toggle-icon"></span>
                        Constellations
                    </button>
                </div>
            </div>
        </div>
    </section>

    <main class="gallery" id="gallery"></main>

    <div id="lightbox" onclick="this.style.display='none'">
        <img src="" id="lightbox-img">
    </div>

    <footer>
        <p>&copy; 2026 Astrophotography Collection &middot; Keep Looking Up</p>
    </footer>
</body>
</html>
